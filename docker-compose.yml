version: '3.8'

services:
  redis:
    image: redis:alpine
    networks:
      - iron-net

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:latest
    command: ["redpanda", "start", "--overprovisioned", "--smp 1", "--memory 1G", "--node-id 0"]
    ports:
      - "9092:9092"
    networks:
      - iron-net

  evidence-loader:
    build: ./evidence-loader
    ports:
      - "8080:8080"
    volumes:
      - ./evidence_data:/evidence
    environment:
      - REDIS_ADDR=redis:6379
      - KAFKA_BROKERS=redpanda:9092
    networks:
      - iron-net
    depends_on: [redpanda, redis]

  orchestrator:
    build: ./orchestrator
    environment:
      - REDIS_ADDR=redis:6379
      - KAFKA_BROKERS=redpanda:9092
    networks:
      - iron-net
    depends_on: [redpanda, redis, evidence-loader]

  vol3-service:
    build: ./vol3-service
    volumes:
      - ./evidence_data:/evidence
    environment:
      - REDIS_ADDR=redis:6379
      - KAFKA_BROKERS=redpanda:9092
    networks:
      - iron-net
    depends_on: [redpanda, redis]

  decision-engine:
    build: ./decision-engine
    volumes:
      - ./output:/app/output
    environment:
      - REDIS_ADDR=redis:6379
      - KAFKA_BROKERS=redpanda:9092
    networks:
      - iron-net
    depends_on: [redpanda, redis]

networks:
  iron-net:
    driver: bridge